<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际文件空间站 | 科技风主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Orbitron", "Microsoft Yahei", sans-serif;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            background: #000411;
            color: #caf0ff;
        }

        /* 代码雨画布背景 */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.25;
        }

        /* 全局容器 */
        .wrap {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* 科技玻璃卡片 + 流光扫描 */
        .tech-card {
            position: relative;
            background: rgba(12, 25, 55, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 200, 255, 0.25);
            border-radius: 18px;
            padding: 35px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.15);
        }

        /* 卡片流光扫过动画 */
        .tech-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,transparent,rgba(0,220,255,0.12),transparent);
            animation: streamLight 4s linear infinite;
        }

        @keyframes streamLight {
            0%{left:-100%}
            100%{left:100%}
        }

        /* 主标题霓虹发光 */
        .main-title {
            font-size: 2.6rem;
            text-align: center;
            background: linear-gradient(90deg,#00e5ff,#2979ff,#00e5ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            color: transparent;
            animation: titleShine 3s linear infinite;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(0,200,255,0.4);
        }

        @keyframes titleShine {
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }

        .subtitle {
            text-align: center;
            color: #80d8ff;
            letter-spacing: 3px;
            margin-bottom: 35px;
        }

        h2 {
            color: #4fc3f7;
            border-left: 4px solid #00b8ff;
            padding-left: 14px;
            margin-bottom: 22px;
            letter-spacing: 1px;
        }

        .info-text {
            line-height: 2;
            color: #b3e5fc;
        }

        /* 文件列表项 */
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            background: rgba(0, 20, 45, 0.4);
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 180, 255, 0.2);
            transition: 0.3s ease;
        }

        .file-item:hover {
            transform: translateY(-3px);
            border-color: #00e5ff;
            box-shadow: 0 0 20px rgba(0,200,255,0.25);
        }

        .file-name {
            font-size: 1.05rem;
        }

        /* 脉冲下载按钮 */
        .down-btn {
            padding: 9px 22px;
            background: linear-gradient(135deg,#0277bd,#00b8d4);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 12px rgba(0,180,255,0.35);
            transition: 0.3s;
        }

        .down-btn:hover {
            box-shadow: 0 0 25px rgba(0,220,255,0.6);
            transform: scale(1.06);
        }

        /* 上传区域 */
        .upload-box {
            border: 2px dashed rgba(0, 200, 255, 0.4);
            border-radius: 14px;
            padding: 45px 20px;
            text-align: center;
            transition: 0.3s;
        }

        .upload-box:hover {
            border-color: #00e5ff;
            background: rgba(0,30,60,0.25);
        }

        input[type="file"] {
            margin-top: 18px;
            color: #ccebff;
        }
    </style>
</head>
<body>
<!-- 全屏代码雨背景 -->
<canvas id="matrixCanvas"></canvas>

<div class="wrap">
    <!-- 个人信息卡片 -->
    <div class="tech-card">
        <h1 class="main-title">星际文件共享空间站</h1>
        <p class="subtitle">PERSONAL TECH STATION</p>

        <h2>个人终端信息</h2>
        <div class="info-text">
            终端昵称：你的名称<br>
            通讯邮箱：yourmail@xxx.com<br>
            终端简介：科技风资源库 | 存档、模组、工具全量共享
        </div>
    </div>

    <!-- 文件上传区域 -->
    <div class="tech-card">
        <h2>云端文件上传</h2>
        <div class="upload-box">
            <p>拖拽/点击选择文件上传终端</p>
            <input type="file" multiple>
        </div>
    </div>

    <!-- 文件下载列表 -->
    <div class="tech-card">
        <h2>公开资源库</h2>

        <div class="file-item">
            <span class="file-name">MC光影材质整合包.zip</span>
            <a href="文件1.zip" class="down-btn">下载获取</a>
        </div>

        <div class="file-item">
            <span class="file-name">游戏精品存档文件.rar</span>
            <a href="文件2.rar" class="down-btn">下载获取</a>
        </div>

        <div class="file-item">
            <span class="file-name">实用工具程序合集</span>
            <a href="文件3.zip" class="down-btn">下载获取</a>
        </div>

    </div>
</div>

<script>
// 黑客代码雨特效
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZアイウエオカキクケコ";
const charArr = chars.split('');
const fontSize = 16;
const col = canvas.width / fontSize;
const drops = [];

for(let i = 0; i < col; i++) drops[i] = 1;

function drawMatrix(){
    ctx.fillStyle = 'rgba(0,0,8,0.08)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#00e5ff';
    ctx.font = fontSize + 'px monospace';
    for(let i = 0; i < drops.length; i++){
        const text = charArr[Math.floor(Math.random()*charArr.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);
        if(drops[i]*fontSize > canvas.height && Math.random()>0.975) drops[i]=0;
        drops[i]++;
    }
}
setInterval(drawMatrix,45);

window.addEventListener('resize',()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
})
</script>
</body>
</html>
